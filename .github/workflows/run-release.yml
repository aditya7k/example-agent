name: Run Release Binary

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  run-binary:
    name: Run release binary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest release binary
        run: |
          # Get the latest release and download the linux-amd64 binary
          gh release download --repo ${{ github.repository }} --pattern 'agent-linux-amd64' --output agent
          chmod +x agent
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate temporary GitHub token (optional)
        id: generate-token
        if: vars.APP_ID != '' && secrets.APP_PRIVATE_KEY != ''
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set token variable
        id: set-token
        run: |
          if [ -n "${{ steps.generate-token.outputs.token }}" ]; then
            echo "Using GitHub App token"
            echo "token=${{ steps.generate-token.outputs.token }}" >> $GITHUB_OUTPUT
            echo "token_type=GitHub App" >> $GITHUB_OUTPUT
          else
            echo "Using built-in GITHUB_TOKEN (fallback)"
            echo "token=${{ github.token }}" >> $GITHUB_OUTPUT
            echo "token_type=Built-in" >> $GITHUB_OUTPUT
          fi

      - name: Run binary with temporary token
        env:
          GITHUB_TOKEN: ${{ steps.set-token.outputs.token }}
        run: |
          echo "🔑 Using token type: ${{ steps.set-token.outputs.token_type }}"
          ./agent --help
          # Add your actual command here, for example:
          # ./agent run --config config.yml
